{% extends "master.html" %}
{% load static %}

{% block title %}SFPSQA - Home{% endblock %}

{% block content %}
<style> 
.splash-container {
    margin: 0;
    height: 100vh;
    background-image: url('{% static "EntryPoint/Bac.jpg" %}');
    background-size: cover;
    background-position: center;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    position: relative;
}

.splash-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, rgba(0,0,0,0.4), rgba(76,175,80,0.2));
    animation: fadeIn 1s ease-out;
}

.splash-content {
    position: relative;
    z-index: 10;
    text-align: center;
    animation: slideUp 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.splash-text {
    color: white;
    font-family: Algerian, serif;
    font-size: 12vw;
    font-weight: bold;
    margin: 0;
    text-shadow: 0 0 30px rgba(76,175,80,0.6), 3px 3px 15px rgba(0,0,0,0.7);
    animation: scaleInBounce 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.splash-subtitle {
    color: rgba(255,255,255,0.95);
    font-size: 1.8vw;
    margin: 20px 0 0 0;
    animation: fadeIn 1s ease-out 0.3s both;
}

.spinner {
    display: inline-block;
    width: 40px;
    height: 40px;
    margin-top: 30px;
    border: 4px solid rgba(255,255,255,0.3);
    border-top: 4px solid white;
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

@keyframes slideUp {
    from {
        opacity: 0;
        transform: translateY(50px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@keyframes scaleInBounce {
    0% {
        opacity: 0;
        transform: scale(0.3);
    }
    70% {
        opacity: 1;
        transform: scale(1.05);
    }
    100% {
        transform: scale(1);
    }
}

@keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}
</style>

<div class="splash-container">
<div class="splash-overlay"></div>
<div class="splash-content">
    <h1 class="splash-text">SFPSQA</h1>
    <p class="splash-subtitle">Food Quality Assessment System</p>
    <div class="spinner"></div>
</div>
</div>

<script>
setTimeout(function() {
    window.location.href = '/main/';
}, 4000);
</script>



{% endblock %}
